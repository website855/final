<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swimming Booking</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #e0f7fa;">

    <header style="background-color: #0077b6; padding: 15px; text-align: center; color: white; font-size: 24px;">
        Swimming Booking
    </header>

    <nav style="background-color: #005f8e; padding: 10px; text-align: center;">
        <a href="home.html" style="color: white; text-decoration: none; padding: 10px; display: inline-block;">Home</a>
        <a href="#" style="color: white; text-decoration: none; padding: 10px; display: inline-block;">Book Now</a>
        <a href="contact.html" style="color: white; text-decoration: none; padding: 10px; display: inline-block;">Contact</a>
    </nav>

    <section style="padding: 20px; text-align: center;">
        <h2 style="color: #0077b6;">Book Your Swimming Slot Now!</h2>
        <p>Reserve your swimming time slot and enjoy a refreshing experience.</p>
        
        <form style="max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1);">
            <label style="display: block; text-align: left; margin-bottom: 5px;">Full Name:</label>
            <input type="text" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;" required>

            <label style="display: block; text-align: left; margin-bottom: 5px;">Swimming Type:</label>
            <select style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
                <option>Recreational</option>
                <option>Lap Swimming</option>
                <option>Diving</option>
                <option>Swimming Lessons</option>
            </select>

            <label style="display: block; text-align: left; margin-bottom: 5px;">Date & Time:</label>
            <input type="datetime-local" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;" required>

            <button type="submit" style="width: 100%; padding: 10px; background-color: #0077b6; color: white; border: none; border-radius: 4px; cursor: pointer;">
                Book Now
            </button>
        </form>
    </section>

    <footer style="background-color: #005f8e; color: white; text-align: center; padding: 10px; position: relative; bottom: 0; width: 100%;">
        &copy; 2025 Swimming Booking
    </footer>

</body>
</html>
