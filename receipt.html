<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameNgo Booking Receipt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .receipt-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .logo {
            width: 80px;
            margin-bottom: 10px;
        }
        .receipt-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #198754;
        }
        .details {
            text-align: left;
            font-size: 16px;
        }
        .details p {
            margin: 5px 0;
        }
        .btn-download, .btn-whatsapp {
            margin-top: 15px;
            width: 100%;
        }
        .whatsapp-reminder {
            font-size: 14px;
            margin-top: 20px;
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="receipt-container">
    <img src="logo.jpg" alt="GameNgo Logo" class="logo">
    <h4 class="receipt-title">Booking Confirmation</h4>
    
    <div class="details">
        <p><strong>Turf:</strong> <span id="turfName"></span></p>
        <p><strong>Username:</strong> <span id="username"></span></p>
        <p><strong>Mobile:</strong> <span id="mobile"></span></p>
        <p><strong>Date:</strong> <span id="date"></span></p>
        <p><strong>Time:</strong> <span id="time"></span> <span id="ampm"></span></p>
    </div>

    <button class="btn btn-success btn-download" onclick="generateReceipt()">Download Receipt</button>
    <button class="btn btn-primary btn-whatsapp" onclick="sendWhatsApp()">Send WhatsApp Message</button>

    <p class="whatsapp-reminder">📌 Please send the downloaded receipt to the turf owner via WhatsApp to confirm your booking.</p>
</div>

<script>
    // Get booking details from URL parameters
    const params = new URLSearchParams(window.location.search);
    document.getElementById("turfName").textContent = params.get("turfName") || "N/A";
    document.getElementById("username").textContent = params.get("username") || "N/A";
    document.getElementById("mobile").textContent = params.get("mobile") || "N/A";
    document.getElementById("date").textContent = params.get("date") || "N/A";
    document.getElementById("time").textContent = params.get("time") || "N/A";
    document.getElementById("ampm").textContent = params.get("ampm") || "N/A";

    // Define WhatsApp numbers for different turfs
    const turfOwners = {
        "Grand City Futsal": "94714878878", 
        "Kokon Sports Club(YMCA)": "94729773896"
    };

    // Generate PDF Receipt
    function generateReceipt() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // Title - GameNgo Name
    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.text("GameNgo Booking Receipt", 60, 20);

    // Booking Details Section
    doc.setFontSize(12);
    doc.setFont("helvetica", "bold");
    doc.text("Booking Details", 20, 40);
    
    doc.setFont("helvetica", "normal");
    doc.text(`Turf Name: ${params.get("turfName")}`, 20, 50);
    doc.text(`Username: ${params.get("username")}`, 20, 60);
    doc.text(`Mobile Number: ${params.get("mobile")}`, 20, 70);
    doc.text(`Date: ${params.get("date")}`, 20, 80);
    doc.text(`Time: ${params.get("time")} ${params.get("ampm")}`, 20, 90);

    // Footer Message
    doc.setFont("helvetica", "italic");
    doc.setFontSize(11);
    doc.setTextColor(0, 0, 0);
    doc.text("Thank you for booking with GameNgo!", 20, 110);

    // Save the PDF
    doc.save("GameNgo_Booking_Receipt.pdf");
}

    // Function to send WhatsApp message
    function sendWhatsApp() {
        const turfName = params.get("turfName");
        const username = params.get("username");
        const mobile = params.get("mobile");
        const date = params.get("date");
        const time = params.get("time");
        const ampm = params.get("ampm");

        // Get the WhatsApp number based on the selected turf
        const ownerPhoneNumber = turfOwners[turfName];

        if (!ownerPhoneNumber) {
            alert("WhatsApp number for this turf is not available.");
            return;
        }

        // Construct WhatsApp message
        const message = `Hello, a new booking has been made!\n\n🏟️ Turf: ${turfName}\n👤 Username: ${username}\n📞 Mobile: ${mobile}\n📅 Date: ${date}\n⏰ Time: ${time} ${ampm}\n\nPlease confirm the booking.`;

        // Encode message and open WhatsApp link
        const whatsappUrl = `https://wa.me/${ownerPhoneNumber}?text=${encodeURIComponent(message)}`;
        window.open(whatsappUrl, "_blank");
    }
</script>

</body>
</html>
