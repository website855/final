<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - GameNgo</title>
</head>
<body style="margin: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">

    <!-- Navigation Bar -->
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background-color: #121cdb; color: white;">
        <div style="display: flex; align-items: center;">
            <img src="logo.jpg" alt="GameNgo Logo" style="height: 40px; width: auto; margin-right: 10px;">
            <span style="font-size: 20px; font-weight: bold;">GameNgo</span>
        </div>
        <div>
            <a href="contact.html" style="color: white; text-decoration: none; font-size: 16px;">Contact Us</a>
        </div>
    </nav>

    <!-- Signup Section -->
    <div style="display: flex; flex-direction: column; align-items: center; padding: 20px;">
        <div style="width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px #121cdb;">
            <h2 style="text-align: center; color: #121cdb;">Sign Up</h2>
            <form id="signupForm" style="display: flex; flex-direction: column;">
                <label for="fullname" style="margin-top: 10px;">Full Name</label>
                <input type="text" id="fullname" name="fullname" required style="padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; width: 100%;">
                
                <label for="email" style="margin-top: 10px;">Email</label>
                <input type="email" id="email" name="email" required style="padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; width: 100%;">
                
                <label for="mobile" style="margin-top: 10px;">Mobile</label>
                <input type="tel" id="mobile" name="mobile" required style="padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; width: 100%;">
                
                <label for="password" style="margin-top: 10px;">Password</label>
                <input type="password" id="password" name="password" required style="padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; width: 100%;">
                
                <label for="repassword" style="margin-top: 10px;">Re-enter Password</label>
                <input type="password" id="repassword" name="repassword" required style="padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; width: 100%;">
                
                <button type="submit" style="margin-top: 20px; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">Sign Up</button>
            </form>
            <p style="text-align: center; margin-top: 10px;">Already have an account? <a href="login.html" style="color: #007bff; text-decoration: none;">Login</a></p>
        </div>
        
    </div>

    <script src="signup.js"></script>
</body>
</html>
