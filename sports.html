<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Game Booking</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #1a1a2e; color: white;">

    <header style="background-color: #0f3460; padding: 15px; text-align: center; font-size: 24px;">
        Video Game Booking
    </header>

    <nav style="background-color: #16213e; padding: 10px; text-align: center;">
        <a href="home.html" style="color: white; text-decoration: none; padding: 10px; display: inline-block;">Home</a>
        <a href="#" style="color: white; text-decoration: none; padding: 10px; display: inline-block;">Book Now</a>
        <a href="contact.html" style="color: white; text-decoration: none; padding: 10px; display: inline-block;">Contact</a>
    </nav>

    <section style="padding: 20px; text-align: center;">
        <h2 style="color: #e94560;">Book a Gaming Session!</h2>
        <p>Reserve a slot and enjoy your favorite video games with friends.</p>
        
        <form style="max-width: 400px; margin: auto; background: #0f3460; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.1);">
            <label style="display: block; text-align: left; margin-bottom: 5px;">Name:</label>
            <input type="text" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;" required>

            <label style="display: block; text-align: left; margin-bottom: 5px;">Number of Players:</label>
            <input type="number" min="1" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;" required>

            <label style="display: block; text-align: left; margin-bottom: 5px;">Game Type:</label>
            <select style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
                <option>FPS (First-Person Shooter)</option>
                <option>Racing</option>
                <option>Fighting</option>
                <option>Adventure</option>
                <option>Multiplayer Battle</option>
            </select>

            <label style="display: block; text-align: left; margin-bottom: 5px;">Date & Time:</label>
            <input type="datetime-local" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;" required>

            <button type="submit" style="width: 100%; padding: 10px; background-color: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer;">
                Book Now
            </button>
        </form>
    </section>

    <footer style="background-color: #16213e; color: white; text-align: center; padding: 10px; position: relative; bottom: 0; width: 100%;">
        &copy; 2025 Video Game Booking
    </footer>

</body>
</html>
